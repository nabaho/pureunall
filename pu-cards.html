<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#101010">
<title>푸른명함첩</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📇</text></svg>">
<link rel="manifest" href="pu-cards-manifest.json">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-check-compat.js"></script>
<style>
:root{
  --bg:#101010; --bg2:#1a1a1a; --row:#151515; --line:#2b2b2b;
  --ink:#f3f3f3; --sub:#9aa0a6; --orange:#ff6f0f; --orange-soft:#3a2410;
  --green:#3ddc84; --red:#ff5d6c;
  --sidebar-w:230px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--ink);display:flex;flex-direction:column;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px}

/* ── 상단 바 ── */
#appbar{display:flex;align-items:center;gap:4px;padding:14px 16px 8px;flex-shrink:0}
#appbar .logo{font-size:23px;font-weight:800;letter-spacing:-.5px}
#modeBadge{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:99px;
  background:var(--orange-soft);color:var(--orange);margin-left:8px}
#modeBadge.live{background:#10301f;color:var(--green)}
#appbar .spacer{flex:1}
.iconbtn{font-size:19px;padding:7px 9px;border-radius:10px}
.iconbtn:active{background:var(--bg2)}

/* ── 탭 ── */
#tabs{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;padding:0 8px}
#tabs button{padding:11px 14px;font-size:16px;font-weight:700;color:var(--sub);
  border-bottom:3px solid transparent}
#tabs button.on{color:#fff;border-bottom-color:#fff}

/* ── 부제 줄: 전체(N)∨ · 정렬 ── */
#subbar{display:flex;align-items:center;gap:14px;padding:11px 16px;flex-shrink:0;
  background:var(--bg2);border-bottom:1px solid var(--line)}
#groupBtn{font-size:16px;font-weight:800;display:flex;align-items:center;gap:6px}
#groupBtn .v{font-size:12px;color:var(--sub)}
#subbar .spacer{flex:1}
.subact{font-size:13.5px;color:var(--ink);display:flex;align-items:center;gap:4px}

/* ── 검색 줄(토글) ── */
#searchbar{display:none;padding:8px 16px;background:var(--bg2);flex-shrink:0;border-bottom:1px solid var(--line)}
#searchbar.open{display:block}
#search{width:100%;padding:10px 14px;border:1px solid var(--line);border-radius:10px;
  background:var(--bg);color:var(--ink);font-size:15px}
#search:focus{outline:none;border-color:var(--orange)}

/* ── 본문 ── */
#main{flex:1;display:flex;min-height:0}
#sidebar{width:var(--sidebar-w);min-width:150px;max-width:420px;background:var(--bg2);
  border-right:1px solid var(--line);overflow-y:auto;padding:10px;flex-shrink:0;display:none}
#resizer{width:5px;cursor:col-resize;flex-shrink:0;display:none}
#resizer:hover{background:var(--orange-soft)}
@media(min-width:761px){ #sidebar,#resizer{display:block} }
.grouphead{display:flex;align-items:center;justify-content:space-between;padding:4px 6px 8px}
.grouphead b{font-size:12px;color:var(--sub);letter-spacing:1px}
.gitem{display:flex;align-items:center;gap:8px;padding:10px;border-radius:10px;font-size:14px;cursor:pointer;user-select:none}
.gitem:hover{background:#222}
.gitem.on{background:var(--orange-soft);color:var(--orange);font-weight:700}
.gitem .cnt{margin-left:auto;font-size:12px;color:var(--sub)}
.gitem.dropover{outline:2px dashed var(--orange)}

#listwrap{flex:1;overflow-y:auto;padding-bottom:110px;min-width:0}
.datehead{font-size:15px;font-weight:700;color:var(--ink);padding:18px 18px 6px;opacity:.92}
.row{display:flex;align-items:center;gap:14px;padding:15px 16px;cursor:pointer;
  border-bottom:1px solid #1d1d1d}
.row:active{background:#191919}
.row.dragging{opacity:.4}
.rowmain{flex:1;min-width:0}
.rowmain .nm{font-size:21px;font-weight:800;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rowmain .l1,.rowmain .l2{font-size:14.5px;color:#cfcfcf;margin-top:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rowmain .l2{color:#bdbdbd}
.thumb{width:148px;height:88px;flex-shrink:0;border-radius:5px;background:#e9e9e9;
  display:flex;align-items:center;justify-content:center;color:#666;font-weight:800;font-size:22px;overflow:hidden}
.thumb img{width:100%;height:100%;object-fit:cover}
.empty{text-align:center;color:var(--sub);padding:70px 24px;font-size:14px;line-height:1.9}

/* ── 주황 FAB ── */
#fab{position:fixed;right:20px;bottom:26px;width:62px;height:62px;border-radius:50%;
  background:var(--orange);color:#fff;font-size:34px;font-weight:300;line-height:1;
  box-shadow:0 6px 20px rgba(255,111,15,.45);display:flex;align-items:center;justify-content:center;z-index:50}
#fab:active{transform:scale(.94)}

/* ── 모달/시트 공통 ── */
.modalbg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
  align-items:flex-end;justify-content:center;z-index:100}
.modalbg.open{display:flex}
.modal{background:#1c1c1c;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
  border-radius:20px 20px 0 0;padding:18px 18px 30px;border:1px solid #2c2c2c}
@media(min-width:761px){.modalbg{align-items:center}.modal{border-radius:20px}}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mhead b{font-size:17px}
.sheetbtn{display:flex;align-items:center;gap:12px;width:100%;padding:15px 12px;
  font-size:16px;font-weight:600;border-radius:12px;text-align:left}
.sheetbtn:active{background:#262626}
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);
  border-radius:10px;background:var(--bg);color:var(--ink)}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--orange)}
.field textarea{resize:vertical;min-height:56px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 10px}
.photo-pane{border:1.5px dashed var(--line);border-radius:12px;padding:10px;text-align:center;
  margin-bottom:12px;background:var(--bg)}
.photo-pane img{max-width:100%;max-height:230px;border-radius:8px;cursor:zoom-in;background:#fff}
.mfoot{display:flex;gap:8px;margin-top:14px}
.btn{padding:13px;border-radius:12px;font-size:14.5px;font-weight:700;flex:1}
.btn.primary{background:var(--orange);color:#fff}
.btn.ghost{background:#262626;color:var(--ink)}
.btn.danger{background:#3a1a1f;color:var(--red)}

/* ── 상세 ── */
.dphoto{width:100%;border-radius:10px;cursor:zoom-in;margin-bottom:14px;background:#fff}
.dname{font-size:23px;font-weight:800}
.dsub{color:var(--sub);font-size:14px;margin:4px 0 16px}
.actrow{display:flex;gap:8px;margin-bottom:16px}
.actrow a{flex:1;text-align:center;text-decoration:none;background:var(--orange-soft);color:var(--orange);
  font-weight:700;font-size:13px;padding:12px 4px;border-radius:12px}
.actrow a.off{opacity:.3;pointer-events:none}
.dlist{border-top:1px solid var(--line)}
.ditem{display:flex;padding:11px 2px;border-bottom:1px solid #262626;font-size:14.5px;gap:10px}
.ditem .k{width:88px;flex-shrink:0;color:var(--sub);font-size:12.5px;padding-top:2px}
.ditem .v{flex:1;word-break:break-all}
.ditem .v a{color:var(--orange);text-decoration:none}

#zoombg{position:fixed;inset:0;background:rgba(0,0,0,.95);display:none;z-index:200;
  align-items:center;justify-content:center;cursor:zoom-out}
#zoombg.open{display:flex}
#zoombg img{max-width:98vw;max-height:96vh;object-fit:contain;background:#fff}

#dropov{position:fixed;inset:0;background:rgba(255,111,15,.12);border:4px dashed var(--orange);
  display:none;z-index:300;align-items:center;justify-content:center;pointer-events:none}
#dropov.open{display:flex}
#dropov .box{background:#1c1c1c;border-radius:16px;padding:26px 34px;font-size:17px;font-weight:800;color:var(--orange)}

#dupbox .btn{width:100%;margin-top:8px}
.selmark{font-size:20px;flex-shrink:0;width:26px;text-align:center}
#selbar{position:fixed;left:0;right:0;bottom:0;display:none;align-items:center;gap:8px;
  background:#1c1c1c;border-top:1px solid var(--line);padding:12px 16px calc(12px + env(safe-area-inset-bottom));z-index:60}
#selbar .btn{flex:none;padding:10px 16px}
.row .fav{color:var(--orange);font-size:14px;margin-right:4px}
/* ── 인앱 카메라 (리멤버식) ── */
#cambg{position:fixed;inset:0;background:#000;display:none;z-index:500;flex-direction:column}
#cambg.open{display:flex}
#camvid{flex:1;width:100%;object-fit:cover;min-height:0}
#camframe{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);
  width:86vw;max-width:540px;aspect-ratio:1.65;border:2.5px solid rgba(255,255,255,.95);
  border-radius:12px;box-shadow:0 0 0 200vmax rgba(0,0,0,.38);pointer-events:none}
#camlabel{position:absolute;left:0;right:0;bottom:152px;text-align:center;color:#fff;font-weight:800;font-size:16px;text-shadow:0 1px 4px #000}
#camclose{position:absolute;top:14px;left:10px;color:#fff;font-size:24px;padding:10px;z-index:3}
#cambar{flex-shrink:0;display:flex;align-items:center;justify-content:space-around;
  padding:16px 22px calc(20px + env(safe-area-inset-bottom));background:#000}
#cambar .side{color:#fff;font-size:13px;display:flex;flex-direction:column;gap:6px;align-items:center;background:none}
#camshutter{width:74px;height:74px;border-radius:50%;border:5px solid #fff;background:var(--orange)}
#camshutter:active{transform:scale(.93)}
#camask{position:absolute;left:0;right:0;bottom:150px;display:none;justify-content:center;gap:10px;z-index:4}
#camask .btn{flex:none;padding:12px 20px}
#toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);background:#2c2c2c;color:#fff;
  font-size:13.5px;padding:12px 19px;border-radius:99px;display:none;z-index:400;max-width:90vw;text-align:center;
  border:1px solid #3a3a3a}
/* ════════════ PC 화면 (밝은 관리자 UI) ════════════ */
body.pc{background:#f3f5f9}
body.pc #appbar,body.pc #tabs,body.pc #subbar,body.pc #searchbar,
body.pc #main,body.pc #fab,body.pc #selbar{display:none!important}
#pcRoot{display:flex;height:100vh;overflow:hidden}
#pcSide{width:240px;flex-shrink:0;background:#1e2a47;color:#dfe6f3;overflow-y:auto;padding:18px 14px}
.pclogo{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px}
.pclogo span{display:block;font-size:11.5px;font-weight:400;color:#8fa0c4;margin-top:4px}
.pcsec{font-size:11.5px;color:#8fa0c4;letter-spacing:1px;margin:20px 4px 8px;display:flex;align-items:center;justify-content:space-between}
.pcsec button{color:#aebcdc;font-size:11.5px;border:1px dashed #3a4a73;border-radius:7px;padding:3px 8px}
.pcsec button:hover{color:#fff;border-color:#6d80ad}
.pcitem{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:9px;font-size:13.5px;cursor:pointer}
.pcitem:hover{background:#27365c}
.pcitem.on{background:#33457a;color:#fff;font-weight:700}
.pcitem span{margin-left:auto;font-size:11.5px;background:#33457a;border-radius:99px;padding:2px 8px}
.pcitem.on span{background:#4a5e9c}
.pcitem.dropover{outline:2px dashed #7e95d0}
.pchintside{font-size:11.5px;color:#7e8db3;line-height:1.7;padding:4px 8px}
#pcMain{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#pcTop{display:flex;gap:10px;padding:14px 22px;background:#fff;border-bottom:1px solid #e4e8f0;align-items:center}
#pcSearch{flex:1;padding:10px 14px 10px 38px;border:1px solid #dde3ee;border-radius:10px;font-size:14px;
  background:#f7f9fc url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%238b98b3" viewBox="0 0 16 16"><path d="M11.7 10.3a6 6 0 1 0-1.4 1.4l3 3 1.4-1.4-3-3zM6 10a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>') 12px center no-repeat}
#pcSearch:focus{outline:none;border-color:#1e2a47;background-color:#fff}
.pcbtn-primary{background:#1e2a47;color:#fff;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:700}
.pcbtn-primary:hover{background:#2c3c66}
.pcbtn-ghost{background:#fff;border:1px solid #dde3ee;border-radius:10px;padding:10px 14px;font-size:15px;color:#5a6885}
#pcHead{display:flex;align-items:center;gap:12px;padding:18px 22px 0}
#pcHead h2{font-size:19px;color:#1b2536}
#pcHead em{font-style:normal;font-size:13px;color:#8b98b3;font-weight:400}
#pcSort{margin-left:auto;padding:7px 10px;border:1px solid #dde3ee;border-radius:8px;background:#fff;color:#1b2536}
.pchint{font-size:12.5px;color:#8b98b3;padding:6px 22px 10px}
#pcSel{padding:0 22px}
#pcSel .bar{display:flex;align-items:center;gap:10px;background:#fff7ee;border:1px solid #f3ddc2;
  border-radius:10px;padding:9px 14px;margin-bottom:10px;font-size:13px;color:#1b2536}
#pcSel .bar button{border:1px solid #e3d2b8;background:#fff;border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:700;color:#1b2536}
#pcSel .bar button.red{color:#c0392b}
#pcTableWrap{flex:1;overflow:auto;padding:0 22px 26px}
#pcTable{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e4e8f0;border-radius:12px;table-layout:fixed}
#pcTable thead th{position:sticky;top:0;background:#f7f9fc;font-size:12px;color:#7c89a6;text-align:left;
  padding:10px 12px;border-bottom:1px solid #e4e8f0;font-weight:700;z-index:1}
#pcTable td{padding:11px 12px;border-bottom:1px solid #eef1f6;font-size:13.5px;color:#33415e;vertical-align:middle;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}   /* 한 줄 고정 + 말줄임 */
#pcTable tbody tr{cursor:pointer}
#pcTable tbody tr:hover{background:#f6f9ff}
#pcTable .nm{font-weight:800;color:#16223c;white-space:nowrap}
#pcTable .co{color:#0c7a64;font-weight:600}
#pcTable .num{color:#9aa6c0;font-size:12px;width:34px}
#pcTable .dt{color:#8b98b3;font-size:12.5px;white-space:nowrap;text-align:right}
#pcTable .dup{color:#d8432e;font-size:12px;font-weight:700;margin-left:6px}
#pcTable .pcempty{text-align:center;color:#8b98b3;padding:60px;font-size:14px;white-space:normal}
/* PC에서 모달·시트는 밝은 테마로 */
body.pc .modal{background:#fff;border-color:#e4e8f0;color:#1b2536}
body.pc .field label{color:#7c89a6}
body.pc .field input,body.pc .field select,body.pc .field textarea{background:#fff;border-color:#dde3ee;color:#1b2536}
body.pc .field input:focus,body.pc .field textarea:focus,body.pc .field select:focus{border-color:#1e2a47}
body.pc .btn.ghost{background:#eef1f6;color:#1b2536}
body.pc .sheetbtn{color:#1b2536}
body.pc .sheetbtn:active,body.pc .sheetbtn:hover{background:#f1f4fa}
body.pc .photo-pane{background:#f7f9fc;border-color:#e4e8f0}
body.pc .ditem{border-color:#eef1f6}
body.pc .ditem .v a{color:#0c7a64}
body.pc .dname,body.pc .mhead b{color:#16223c}
body.pc .actrow a{background:#eaf1fe;color:#1d4fc4}
body.pc #toast{background:#1e2a47;border-color:#1e2a47}
/* PC 오른쪽 상세 패널 (리멤버식) */
#pcDetail{position:fixed;top:0;right:0;width:420px;max-width:90vw;height:100vh;background:#fff;
  border-left:1px solid #e4e8f0;box-shadow:-8px 0 24px rgba(20,30,50,.08);
  transform:translateX(100%);transition:transform .22s ease;z-index:120;overflow-y:auto;display:none;flex-direction:column}
body.pc #pcDetail{display:flex}
#pcDetail.open{transform:translateX(0)}
#pcDetail .pdhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #eef1f6;position:sticky;top:0;background:#fff;z-index:1}
#pcDetail .pdhead .ttl{font-size:13px;color:#7c89a6;font-weight:700}
#pcDetail .pdhead .x{font-size:20px;color:#8b98b3;padding:6px 8px;border-radius:8px}
#pcDetail .pdhead .x:hover{background:#f1f4fa}
#pcDetail .pdbody{padding:20px;flex:1}
#pcDetail .pdphoto{width:100%;border-radius:10px;border:1px solid #e4e8f0;background:#fff;cursor:zoom-in;margin-bottom:14px}
#pcDetail .pdname{font-size:21px;font-weight:800;color:#16223c}
#pcDetail .pdname .star{font-size:18px;cursor:pointer;color:#f5a623;margin-left:6px}
#pcDetail .pdsub{color:#6b7892;font-size:13.5px;margin:5px 0 18px}
#pcDetail .pdsec{font-size:12px;font-weight:700;color:#9aa6c0;letter-spacing:1px;margin:18px 0 8px}
#pcDetail .pdrow{display:flex;padding:9px 0;border-bottom:1px solid #f2f5f9;font-size:14px}
#pcDetail .pdrow .k{width:84px;flex-shrink:0;color:#8b98b3;font-size:12.5px;padding-top:1px}
#pcDetail .pdrow .v{flex:1;color:#33415e;word-break:break-all}
#pcDetail .pdrow .v a{color:#1d6fd8;text-decoration:none}
#pcDetail .pdacts{display:flex;flex-wrap:wrap;gap:7px;margin:16px 0}
#pcDetail .pdacts button{flex:1 1 calc(50% - 7px);background:#f4f7fc;border:1px solid #e4e8f0;border-radius:9px;
  padding:9px;font-size:12.5px;font-weight:700;color:#33415e}
#pcDetail .pdacts button:hover{background:#eaf1fe;color:#1d4fc4;border-color:#cfe0fb}
#pcDetail .pdacts button.danger{color:#c0392b}
#pcDetail .pdmemo{background:#f7f9fc;border:1px solid #eef1f6;border-radius:9px;padding:11px;font-size:13px;color:#475569;white-space:pre-wrap;line-height:1.6}
</style>
</head>
<body>

<div id="appbar">
  <div class="logo">명함첩</div>
  <span id="modeBadge">데모</span>
  <div class="spacer"></div>
  <button class="iconbtn" onclick="searchbar.classList.toggle('open');if(searchbar.classList.contains('open'))search.focus()">🔍</button>
  <button class="iconbtn" onclick="openMenu()">☰</button>
</div>

<div id="tabs">
  <button id="tabCard" class="on" onclick="setTab('card')">명함</button>
  <button id="tabBiz" onclick="setTab('biz')">사업자등록증</button>
</div>

<div id="subbar">
  <button id="groupBtn" onclick="openGroupSheet()">전체 (0) <span class="v">▼</span></button>
  <div class="spacer"></div>
  <button class="subact" onclick="toggleSort()">⇅ <span id="sortLabel">등록일순</span></button>
  <button class="subact" onclick="toggleSelMode()">✎ <span id="selLabel">편집</span></button>
</div>

<div id="searchbar"><input id="search" placeholder="이름·회사·전화번호 검색" oninput="render()"></div>

<div id="main">
  <div id="sidebar"></div>
  <div id="resizer"></div>
  <div id="listwrap"><div id="list"></div></div>
</div>

<button id="fab" onclick="openAddSheet()">＋</button>
<div id="selbar"></div>
<input type="file" id="backInput" accept="image/*" hidden onchange="onBackFile(this.files);this.value=''">

<input type="file" id="cameraInput" accept="image/*" capture="environment" hidden onchange="onFiles(this.files);this.value=''">
<input type="file" id="fileInput" accept="image/*,.pdf" multiple hidden onchange="onFiles(this.files);this.value=''">
<input type="file" id="importInput" accept=".xlsx,.xls,.csv,.vcf,text/csv,text/vcard" hidden onchange="onImportFile(this.files);this.value=''">

<div class="modalbg" id="addBg" onclick="if(event.target===this)this.classList.remove('open')"><div class="modal" id="addM"></div></div>

<div id="toast"></div>
<script>
/* ════════════════════════════════════════════════════════════
   ★★★ 설정: 여기에 pu-erp.html의 firebaseConfig를 붙여넣으세요 ★★★
   null이면 "데모 모드"(이 기기에만 저장)로 동작합니다.
   ════════════════════════════════════════════════════════════ */
const FB_APPCHECK_KEY = '6Ldu1hEtAAAAABB9lH9EMEyd7uBLEy9H5HxJoua_'; // ERP와 동일 reCAPTCHA v3 키
const FIREBASE_CONFIG = {
  apiKey: 'AIzaSyDkZz5QlKSoqMOYByp5YGeMNLNDrIghliA',
  databaseURL: 'https://pureun-erp-default-rtdb.asia-southeast1.firebasedatabase.app',
  projectId: 'pureun-erp',
  appId: '1:936817166182:web:9bd31f70d0afdf5fca2aa7',
  messagingSenderId: '936817166182'
};

const DB_ROOT = 'pucards';
const GEMINI_KEY_LS = 'pucards_gemini_key';

const state = { tab:'card', group:'all', owner:'all', sort:'date', sortKey:null, sortDir:'desc', page:0, pageSize:100, selMode:false, sel:{}, items:{}, groups:{} };

/* ── 데이터 계층 ── */
const Store = {
  mode:'local', db:null,
  init(){
    if (FIREBASE_CONFIG && typeof firebase !== 'undefined' && firebase.initializeApp) {
      firebase.initializeApp(FIREBASE_CONFIG);
      if (FB_APPCHECK_KEY && firebase.appCheck){
        try{ firebase.appCheck().activate(new firebase.appCheck.ReCaptchaV3Provider(FB_APPCHECK_KEY), true); }
        catch(e){ console.warn('[AppCheck]', e&&e.message); }
      }
      this.db = firebase.database();
      this.mode = 'firebase';
      modeBadge.textContent='실시간 공유'; modeBadge.classList.add('live');
      const subscribe = () => {
        this.db.ref(DB_ROOT+'/items').on('value', s => { state.items = s.val()||{}; render(); });
        this.db.ref(DB_ROOT+'/groups').on('value', s => { state.groups = s.val()||{}; render(); });
      };
      /* ERP와 동일하게 익명 인증 완료 후 구독 (보안규칙 auth!=null 대응) */
      if (firebase.auth){
        firebase.auth().onAuthStateChanged(u=>{
          if (u){ subscribe(); }
          else firebase.auth().signInAnonymously().catch(e=>{
            console.warn('[Auth]', e&&e.message); subscribe(); /* 실패해도 시도 */ });
        });
      } else subscribe();
    } else {
      state.items  = JSON.parse(localStorage.getItem('pucards_local_items')||'{}');
      state.groups = JSON.parse(localStorage.getItem('pucards_local_groups')||'{}');
      /* 구버전 구조(item.photo 내장) → 사진 분리 저장으로 1회 이전 */
      Object.values(state.items).forEach(it=>{
        if (it.photo){ const p=it.photo; delete it.photo; this.putPhoto(it.id,p);
          makeThumb(p).then(t=>{ it.thumb=t; this._ls(); render(); }); } });
      this._ls();
      render();
    }
  },
  _ls(){ localStorage.setItem('pucards_local_items', JSON.stringify(state.items));
         localStorage.setItem('pucards_local_groups', JSON.stringify(state.groups)); },
  put(it){ it.updatedAt = Date.now();
    if (this.mode==='firebase') this.db.ref(`${DB_ROOT}/items/${it.id}`).set(it);
    else { state.items[it.id]=it; this._ls(); render(); } },
  del(id){ this.delPhoto(id); this.delPhoto(id+'_b');
    if (this.mode==='firebase') this.db.ref(`${DB_ROOT}/items/${id}`).remove();
    else { delete state.items[id]; this._ls(); render(); } },
  /* 원본 사진은 목록 데이터와 분리 저장 — 필요할 때만 내려받음 */
  photoCache:{},
  async getPhoto(id){
    if (this.photoCache[id]!==undefined) return this.photoCache[id];
    let p='';
    if (this.mode==='firebase'){ const s=await this.db.ref(`${DB_ROOT}/photos/${id}`).once('value'); p=s.val()||''; }
    else p=(JSON.parse(localStorage.getItem('pucards_local_photos')||'{}'))[id]||'';
    this.photoCache[id]=p; return p;
  },
  putPhoto(id,dataUrl){ this.photoCache[id]=dataUrl;
    if (this.mode==='firebase') this.db.ref(`${DB_ROOT}/photos/${id}`).set(dataUrl);
    else { const m=JSON.parse(localStorage.getItem('pucards_local_photos')||'{}'); m[id]=dataUrl;
      try{ localStorage.setItem('pucards_local_photos', JSON.stringify(m)); }
      catch(e){ toast('데모 모드 용량 초과 — 원본 사진을 모두 보관하지 못합니다'); } } },
  delPhoto(id){ delete this.photoCache[id];
    if (this.mode==='firebase') this.db.ref(`${DB_ROOT}/photos/${id}`).remove();
    else { const m=JSON.parse(localStorage.getItem('pucards_local_photos')||'{}'); delete m[id];
      localStorage.setItem('pucards_local_photos', JSON.stringify(m)); } },
  putGroup(g){ if (this.mode==='firebase') this.db.ref(`${DB_ROOT}/groups/${g.id}`).set(g);
    else { state.groups[g.id]=g; this._ls(); render(); } },
  delGroup(id){ Object.values(state.items).forEach(it=>{ if(it.group===id){ it.group=''; this.put(it);} });
    if (this.mode==='firebase') this.db.ref(`${DB_ROOT}/groups/${id}`).remove();
    else { delete state.groups[id]; this._ls(); render(); } }
};

/* ── 유틸 ── */
const $ = id => document.getElementById(id);
const esc = s => String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const uid = () => 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const digits = s => String(s||'').replace(/\D/g,'');
const fmtDate = ts => { const d=new Date(ts||0);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; };
const fmtBizno = v => { const d=digits(v); return d.length===10 ? `${d.slice(0,3)}-${d.slice(3,5)}-${d.slice(5)}` : (v||''); };
function toast(msg, ms=2600){ const t=$('toast'); t.textContent=msg; t.style.display='block';
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.style.display='none', ms); }

/* ── 탭 / 정렬 ── */
function setTab(tab){ state.tab=tab; state.group='all';
  $('tabCard').classList.toggle('on', tab==='card');
  $('tabBiz').classList.toggle('on', tab==='biz');
  $('search').placeholder = tab==='card' ? '이름·회사·전화번호 검색' : '상호·대표자·사업자번호 검색';
  render(); }
function toggleSort(){ state.sort = state.sort==='date' ? 'name' : 'date';
  $('sortLabel').textContent = state.sort==='date' ? '등록일순' : '이름순'; render(); }

/* ── 목록 데이터 ── */
const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function chosung(s){ let r='';
  for (const ch of String(s||'')){ const c=ch.charCodeAt(0);
    r += (c>=0xAC00 && c<=0xD7A3) ? CHO[Math.floor((c-0xAC00)/588)] : ch; }
  return r; }
function listItems(){
  const q = $('search').value.trim().toLowerCase();
  const qc = q.replace(/\s/g,'');
  const isCho = qc && /^[ㄱ-ㅎ]+$/.test(qc);   /* 초성 검색: ㅎㄱㄷ → 홍길동 */
  const arr = Object.values(state.items)
    .filter(it => it.kind===state.tab)
    .filter(it => state.group==='all' || (it.group||'')===state.group)
    .filter(it => state.owner==='all' || (it.owner||'')===state.owner)
    .filter(it => !q || [it.name,it.company,it.title,it.dept,it.mobile,it.tel,it.email,
                         it.ceo,it.bizno,it.address].some(v => String(v||'').toLowerCase().includes(q)
                         || (digits(q).length>=3 && digits(v).includes(digits(q))))
                || (isCho && [it.name,it.company,it.ceo].some(v=>chosung(v).replace(/\s/g,'').includes(qc))));
  /* 헤더 클릭 정렬(PC) 우선, 없으면 기존 등록일/이름순 */
  if (state.sortKey){
    const dir = state.sortDir==='asc' ? 1 : -1;
    const val = (it)=>{
      switch(state.sortKey){
        case 'name': return it.name||it.company||'';
        case 'company': return it.company||'';
        case 'phone': return digits(it.mobile||it.tel||'');
        case 'date': return it.createdAt||0;
        default: return '';
      }
    };
    arr.sort((a,b)=>{ const x=val(a),y=val(b);
      if (typeof x==='number') return (x-y)*dir;
      return String(x).localeCompare(String(y),'ko')*dir; });
  }
  else if (state.sort==='name')
    arr.sort((a,b)=>String(a.name||a.company||'').localeCompare(String(b.name||b.company||''),'ko'));
  else arr.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  return arr;
}

/* ── 렌더링 ── */
function render(){ renderSubbar(); renderSidebar(); renderList(); }

function groupName(id){ return id==='all' ? '전체' : (id==='' ? '미분류' : (state.groups[id]?.name || '전체')); }

function renderSubbar(){
  const n = listItems().length;
  $('groupBtn').innerHTML = `${esc(groupName(state.group))} (${n.toLocaleString()}) <span class="v">▼</span>`;
}

function renderSidebar(){
  const all = Object.values(state.items).filter(it=>it.kind===state.tab);
  const cnt = g => all.filter(it=>(it.group||'')===g).length;
  const groups = Object.values(state.groups).sort((a,b)=>(a.order||0)-(b.order||0));
  let h = `<div class="grouphead"><b>그룹</b><button class="iconbtn" onclick="addGroup()">＋</button></div>`;
  h += gItem('all','📂 전체', all.length);
  h += gItem('','📁 미분류', cnt(''));
  groups.forEach(g => h += gItem(g.id,'📁 '+esc(g.name), cnt(g.id), true));
  $('sidebar').innerHTML = h;
}
function gItem(id,label,n,custom){
  const on = state.group===id ? 'on':'';
  return `<div class="gitem ${on}" onclick="state.group='${id}';render()"
    ondragover="event.preventDefault();this.classList.add('dropover')"
    ondragleave="this.classList.remove('dropover')"
    ondrop="onGroupDrop(event,'${id}')"
    ${custom?`oncontextmenu="event.preventDefault();groupMenu('${id}')"`:''}>
    ${label}<span class="cnt">${n}</span></div>`;
}
function addGroup(){ const name=prompt('새 그룹 이름'); if(!name||!name.trim()) return;
  Store.putGroup({id:uid(), name:name.trim(), order:Date.now()}); }
function groupMenu(id){ const g=state.groups[id]; if(!g) return;
  const name=prompt('그룹 이름 수정 (비우고 확인하면 삭제)', g.name);
  if(name===null) return;
  if(!name.trim()){ if(confirm(`'${g.name}' 그룹을 삭제할까요? (항목은 미분류로 이동)`)) Store.delGroup(id); }
  else { g.name=name.trim(); Store.putGroup(g); } }

/* 모바일: 그룹 선택 시트 (리멤버의 '전체 ∨' 역할) */
function openGroupSheet(){
  const all = Object.values(state.items).filter(it=>it.kind===state.tab);
  const cnt = g => all.filter(it=>(it.group||'')===g).length;
  const groups = Object.values(state.groups).sort((a,b)=>(a.order||0)-(b.order||0));
  let h = `<div class="mhead"><b>그룹 선택</b><button class="iconbtn" onclick="groupSheetBg.classList.remove('open')">✕</button></div>`;
  const mk=(id,label,n)=>`<button class="sheetbtn" onclick="onGroupChoice('${id}')">
     ${state.group===id?'✅':'📁'} ${label}<span style="margin-left:auto;color:var(--sub);font-size:13px">${n}</span></button>`;
  h += mk('all','전체',all.length) + mk('','미분류',cnt(''));
  groups.forEach(g=> h += mk(g.id, esc(g.name), cnt(g.id)));
  h += `<button class="sheetbtn" style="color:var(--orange)" onclick="groupSheetBg.classList.remove('open');addGroup()">＋ 새 그룹 만들기</button>`;
  if (selPick) h = h.replace('그룹 선택', '이동할 그룹 선택');
  $('groupSheetM').innerHTML = h; $('groupSheetBg').classList.add('open');
}
function onGroupChoice(id){
  $('groupSheetBg').classList.remove('open');
  if (selPick){
    selPick=false;
    const gid = id==='all' ? '' : id;
    Object.keys(state.sel).forEach(sid=>{ const it=state.items[sid]; if(it){ it.group=gid; Store.put(it); } });
    toast(Object.keys(state.sel).length+'개 항목을 이동했습니다');
    state.sel={}; renderSelbar(); renderList();
  } else { state.group=id; render(); }
}

function renderList(){
  const items = listItems();
  if (!items.length){
    $('list').innerHTML = `<div class="empty">등록된 항목이 없습니다.<br><br>
      주황 <b style="color:var(--orange)">＋</b> 버튼으로 촬영하거나,<br>
      PC에서는 이미지·PDF를 화면에 끌어다 놓거나<br>카톡 이미지 복사 후 <b>Ctrl+V</b> 하면 자동 등록됩니다.</div>`;
    return;
  }
  function rowHtml(it){
    const isCard = state.tab==='card';
    const name = isCard ? (it.name||'(이름 없음)') : (it.company||'(상호 없음)');
    const l1 = isCard ? [it.title,it.dept].filter(Boolean).join(' / ') : (it.ceo ? '대표자 '+it.ceo : '');
    const l2 = isCard ? (it.company||'') : fmtBizno(it.bizno);
    const th = it.thumb ? `<img src="${it.thumb}" loading="lazy">` : esc(name.charAt(0));
    const click = state.selMode ? `toggleSel('${it.id}')` : `openDetail('${it.id}')`;
    return `<div class="row" draggable="${!state.selMode}"
      ondragstart="onRowDrag(event,'${it.id}')" ondragend="this.classList.remove('dragging')"
      onclick="${click}">
      ${state.selMode?`<div class="selmark">${state.sel[it.id]?'✅':'⚪'}</div>`:''}
      <div class="rowmain"><div class="nm">${it.fav?'<span class="fav">⭐</span>':''}${esc(name)}</div>
        ${l1?`<div class="l1">${esc(l1)}</div>`:''}
        ${l2?`<div class="l2">${esc(l2)}</div>`:''}</div>
      <div class="thumb">${th}</div></div>`;
  }
  let h='', lastDate='';
  const favs=items.filter(i=>i.fav), rest=items.filter(i=>!i.fav);
  if (favs.length){ h+=`<div class="datehead">⭐ 즐겨찾기</div>`; favs.forEach(it=>h+=rowHtml(it)); }
  rest.forEach(it=>{
    if (state.sort==='date'){
      const d = fmtDate(it.createdAt||it.updatedAt);
      if (d!==lastDate){ h += `<div class="datehead">${d}</div>`; lastDate=d; }
    }
    h += rowHtml(it);
  });
  $('list').innerHTML = h;
}

/* ── ✎ 일괄 선택 모드 ── */
function toggleSelMode(){
  state.selMode=!state.selMode; state.sel={};
  $('selLabel').textContent = state.selMode ? '완료' : '편집';
  $('fab').style.display = state.selMode ? 'none' : '';
  renderSelbar(); renderList();
}
function toggleSel(id){ if(state.sel[id]) delete state.sel[id]; else state.sel[id]=1;
  renderSelbar(); render(); }
function renderSelbar(){
  const bar=$('selbar');
  if (!state.selMode){ bar.style.display='none'; return; }
  const n=Object.keys(state.sel).length;
  bar.style.display='flex';
  bar.innerHTML=`<span style="font-weight:700">${n}개 선택</span><div style="flex:1"></div>
    <button class="btn ghost" onclick="selPickGroup()">📁 그룹 이동</button>
    <button class="btn danger" onclick="delSel()">삭제</button>`;
}
let selPick=false;
function selPickGroup(){ if(!Object.keys(state.sel).length) return toast('항목을 먼저 선택하세요');
  selPick=true; openGroupSheet(); }
function delSel(){
  const ids=Object.keys(state.sel); if(!ids.length) return toast('항목을 먼저 선택하세요');
  if(!confirm(ids.length+'개 항목을 삭제할까요? (전 직원 명함첩에서 삭제됩니다)')) return;
  ids.forEach(id=>Store.del(id)); state.sel={}; renderSelbar(); toast('삭제했습니다');
}

/* ── 그룹으로 드래그 이동(PC) ── */
let dragId=null;
function fileNameFor(it){
  const base=(it.kind==='card' ? (it.name||'명함')+'_명함' : (it.company||'사업자등록증')+'_사업자등록증');
  return base.replace(/[\\/:*?"<>|]/g,'')+'.jpg';
}
function onRowDrag(e,id){ dragId=id; e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed='copyMove';
  const it=state.items[id];
  const img=Store.photoCache[id]||it?.thumb;   /* 바탕화면·폴더로 끌면 사진 파일로 저장됨 */
  if(img) e.dataTransfer.setData('DownloadURL', `image/jpeg:${fileNameFor(it)}:${img}`);
  if(Store.photoCache[id]===undefined) Store.getPhoto(id); /* 원본 적재 → 다음 드래그는 원본 */
}
function onGroupDrop(e,gid){ e.preventDefault(); e.currentTarget.classList.remove('dropover');
  if(!dragId) return; const it=state.items[dragId]; if(!it) return;
  it.group = gid==='all' ? '' : gid; Store.put(it); toast('그룹으로 이동했습니다'); dragId=null; }

/* ════════════ 파일 입력 루프: 촬영·파일·드래그·Ctrl+V → AI → 저장 ════════════ */
const fileQueue=[]; let processing=false;
function onFiles(files){ [...files].forEach(f=>fileQueue.push(f)); pumpQueue(); }
async function pumpQueue(){
  if (processing || !fileQueue.length) return;
  processing=true;
  const f=fileQueue.shift();
  try{
    toast('이미지 처리 중…',9000);
    const photo = await fileToImage(f);
    const thumb = await makeThumb(photo);
    let pre={};
    if (localStorage.getItem(GEMINI_KEY_LS)){
      toast('🤖 AI가 정보를 읽고 있습니다…',15000);
      try{ pre = await aiExtract(photo, state.tab); }
      catch(e){ console.error(e); toast('AI 추출 실패 — 직접 입력해주세요'); }
    } else toast('AI 키가 없어 직접 입력 모드입니다 (☰ 설정에서 등록)');
    openEditor(null, {photo, thumb}, pre);
  }catch(e){ console.error(e); toast('파일을 읽을 수 없습니다'); processing=false; pumpQueue(); }
}
function queueNext(){ processing=false; pumpQueue(); }

async function fileToImage(f){
  if (f.type==='application/pdf' || /\.pdf$/i.test(f.name||'')) return pdfToImage(f);
  const url=URL.createObjectURL(f);
  const img=await new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=url; });
  URL.revokeObjectURL(url);
  return shrink(img);
}
function shrink(img){
  const M=1400, r=Math.min(1, M/Math.max(img.width,img.height));
  const c=document.createElement('canvas');
  c.width=Math.round(img.width*r); c.height=Math.round(img.height*r);
  c.getContext('2d').drawImage(img,0,0,c.width,c.height);
  return c.toDataURL('image/jpeg',.8);
}
/* 목록용 썸네일(약 5~10KB) — 목록 로딩을 가볍게 유지 */
function makeThumb(dataUrl){
  return new Promise(res=>{ const i=new Image();
    i.onload=()=>{ const M=320, r=Math.min(1, M/Math.max(i.width,i.height));
      const c=document.createElement('canvas');
      c.width=Math.round(i.width*r); c.height=Math.round(i.height*r);
      c.getContext('2d').drawImage(i,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',.65)); };
    i.onerror=()=>res(''); i.src=dataUrl; });
}
async function pdfToImage(f){
  if (!window.pdfjsLib){
    await new Promise((res,rej)=>{ const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  const buf=await f.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const page=await pdf.getPage(1);
  const vp=page.getViewport({scale:2});
  const c=document.createElement('canvas'); c.width=vp.width; c.height=vp.height;
  await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
  const img=new Image(); img.src=c.toDataURL('image/jpeg',.85);
  await new Promise(r=>img.onload=r);
  return shrink(img);
}

let dragDepth=0;
window.addEventListener('dragenter',e=>{ if([...e.dataTransfer.types].includes('Files')){ dragDepth++; $('dropov').classList.add('open'); }});
window.addEventListener('dragleave',()=>{ if(--dragDepth<=0){ dragDepth=0; $('dropov').classList.remove('open'); }});
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('drop',e=>{ e.preventDefault(); dragDepth=0; $('dropov').classList.remove('open');
  if(e.dataTransfer.files.length) onFiles(e.dataTransfer.files); });
window.addEventListener('paste',e=>{

  if(imgs.length){ e.preventDefault(); onFiles(imgs.map(i=>i.getAsFile())); }
});

/* ════════════ AI 자동 추출 (Gemini) ════════════ */
async function aiExtract(dataUrl, kind){
  const key=localStorage.getItem(GEMINI_KEY_LS);
  const prompt = kind==='card'
    ? `이 명함 이미지에서 정보를 추출해 JSON으로만 답하세요. 키: name(이름), company(회사명), dept(부서), title(직책), mobile(휴대폰), tel(유선전화), fax(팩스), email(이메일), address(주소), memo(기타 정보). 없는 값은 빈 문자열. 전화번호는 010-1234-5678 형식. JSON 외 텍스트 금지.`
    : `이 사업자등록증 이미지에서 정보를 추출해 JSON으로만 답하세요. 키: company(상호/법인명), ceo(대표자), bizno(사업자등록번호), corpno(법인등록번호), openDate(개업연월일), bizType(업태), bizItem(종목), address(사업장 소재지), memo(기타). 없는 값은 빈 문자열. JSON 외 텍스트 금지.`;
  const body={contents:[{parts:[
    {inline_data:{mime_type:'image/jpeg',data:dataUrl.split(',')[1]}},
    {text:prompt}]}]};
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(key)}`,
    {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error('Gemini API 오류 '+r.status);
  const j=await r.json();
  const t=(j.candidates?.[0]?.content?.parts||[]).map(p=>p.text||'').join('');
  return JSON.parse(t.replace(/```json|```/g,'').trim());
}

const CARD_FIELDS=[['name','이름'],['company','회사'],['dept','부서'],['title','직책'],

async function onBackFile(files){

async function saveEditor(){
  const kind=editing.kind;
  const fields = kind==='card' ? CARD_FIELDS : BIZ_FIELDS;
  const it={ id: editing.id||uid(), kind, group:$('f_group').value,
    thumb: editing.thumb || (editing.id ? (state.items[editing.id]?.thumb||'') : ''),
    thumb2: editing.thumb2 || (editing.id ? (state.items[editing.id]?.thumb2||'') : ''),
    fav: editing.id ? !!state.items[editing.id]?.fav : false,
    createdAt: editing.id ? (state.items[editing.id]?.createdAt||Date.now()) : Date.now() };
  fields.forEach(([k])=> it[k]=$('f_'+k).value.trim());
  if (kind==='card' && !it.name && !it.company) return toast('이름 또는 회사를 입력해주세요');
  if (kind==='biz' && !it.company && !it.bizno) return toast('상호 또는 사업자번호를 입력해주세요');

  if (!editing.id){
    const keyVal = kind==='card' ? digits(it.mobile) : digits(it.bizno);
    if (keyVal){
      const dup = Object.values(state.items).find(x=> x.kind===kind && x.id!==it.id &&
        (kind==='card' ? digits(x.mobile)===keyVal : digits(x.bizno)===keyVal));
      if (dup){
        const act = await dupDialog(dup, kind);
        if (act==='cancel') return;
        if (act==='merge'){ mergeInto(dup,it);
          if (editing.photoDirty && editing.photo) Store.putPhoto(dup.id, editing.photo);
          if (editing.photoDirty2 && editing.photo2) Store.putPhoto(dup.id+'_b', editing.photo2);
          $('editorBg').classList.remove('open'); editing=null;
          toast('기존 항목을 업데이트했습니다'); queueNext(); return; }
      }
    }
  }
  Store.put(it);
  if (editing.photoDirty && editing.photo) Store.putPhoto(it.id, editing.photo);
  if (editing.photoDirty2 && editing.photo2) Store.putPhoto(it.id+'_b', editing.photo2);
  $('editorBg').classList.remove('open'); editing=null;
  toast('저장되었습니다'+(Store.mode==='firebase'?' — 전 직원 공유 완료':''));
  queueNext();
}
function mergeInto(oldIt,newIt){
  Object.keys(newIt).forEach(k=>{ if(['id','createdAt'].includes(k)) return; if(newIt[k]) oldIt[k]=newIt[k]; });
  Store.put(oldIt);

/* 명함을 카톡·문자로 공유 (텍스트 + 사진) */
async function shareItem(id){
  const it=state.items[id]; if(!it) return;
  const isCard = it.kind==='card';
  const text = (isCard
    ? [it.name, [it.company,it.dept,it.title].filter(Boolean).join(' '),
       it.mobile&&'휴대폰 '+it.mobile, it.tel&&'전화 '+it.tel,
       it.email&&'이메일 '+it.email, it.address]
    : [it.company, it.ceo&&'대표자 '+it.ceo, it.bizno&&'사업자번호 '+fmtBizno(it.bizno), it.address])
    .filter(Boolean).join('\n');
  const data = { title: isCard ? (it.name||'명함') : (it.company||'사업자등록증'), text };
  try{
    const p = await Store.getPhoto(id);
    if (p && navigator.canShare){
      const blob = await (await fetch(p)).blob();
      const file = new File([blob], fileNameFor(it), {type:'image/jpeg'});
      if (navigator.canShare({files:[file]})) data.files=[file];
    }
  }catch(e){}
  if (navigator.share){ try{ await navigator.share(data); }catch(e){} }
  else { try{ await navigator.clipboard.writeText(text); toast('이 브라우저는 공유창이 없어 내용을 복사했습니다'); }catch(e){ toast('공유를 지원하지 않는 브라우저입니다'); } }
}

/* ════════════ 내 폰 연락처 저장 (vCard) ════════════ */
function downloadVcf(id){
  const it=state.items[id]; if(!it) return;
  const lines=['BEGIN:VCARD','VERSION:3.0',
    `N:${it.name||''};;;;`,`FN:${it.name||''}`,
    it.company && `ORG:${it.company}${it.dept?';'+it.dept:''}`,
    it.title && `TITLE:${it.title}`,
    it.mobile && `TEL;TYPE=CELL:${it.mobile}`,
    it.tel && `TEL;TYPE=WORK:${it.tel}`,
    it.fax && `TEL;TYPE=FAX:${it.fax}`,
    it.email && `EMAIL:${it.email}`,
    it.address && `ADR;TYPE=WORK:;;${it.address};;;;`,
    it.memo && `NOTE:${it.memo.replace(/\n/g,'\\n')}`,
    'END:VCARD'].filter(Boolean);
  const blob=new Blob([lines.join('\r\n')],{type:'text/vcard;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=(it.name||'contact')+'.vcf';
  a.click(); URL.revokeObjectURL(a.href);
  toast('내려받은 파일을 열면 연락처에 저장됩니다');
}

/* ════════════ ERP 거래처(companies) 연동 — 명함 → ERP ════════════ */
/* ERP의 CompanyRef와 동일한 정규화로 중복 거래처 생성 방지 */
function erpNormName(s){ return String(s||'')
  .replace(/㈜|\(주\)|주식회사|주\)|\(유\)|유한회사|농업회사법인/g,'')
  .replace(/\s+/g,'').replace(/[·.,'"`()]/g,'').toLowerCase(); }
function erpNormBiz(s){ const d=String(s||'').replace(/\D/g,''); return d.length>=10?d.slice(0,10):''; }

async function sendToErp(id){
  const it=state.items[id]; if(!it || it.kind!=='card') return;
  if (Store.mode!=='firebase') return toast('ERP 연동은 Firebase 연결 후 가능합니다');
  if (!it.company) return toast('회사명이 없어 거래처로 등록할 수 없습니다');
  try{
    const snap = await Store.db.ref('companies').once('value');
    const cos = snap.val();
    const list = Array.isArray(cos) ? cos.slice() : (cos ? Object.values(cos) : []);
    const nBiz=erpNormBiz(it.bizno), nName=erpNormName(it.company);
    const exist = list.find(c=> (nBiz && erpNormBiz(c.bizNo)===nBiz) || (nName && erpNormName(c.name)===nName));
    if (exist) return toast(`이미 ERP 거래처에 있습니다: ${exist.name}`);
    if (!confirm(`'${it.company}'를 ERP 거래처로 등록할까요?`)) return;
    /* ERP companies 레코드 형태(필드명 일치): name·bizNo·ceo·phone·email·address·manager */
    const rec = { id:'co-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),
      name: it.company, bizNo: it.bizno||'', ceo: '',
      phone: it.tel || it.mobile || '', email: it.email||'',
      address: it.address||'', manager: it.owner||'',
      _fromCard: it.id, createdAt: Date.now() };
    if (Array.isArray(cos)){ list.push(rec); await Store.db.ref('companies').set(list); }
    else { await Store.db.ref('companies/'+rec.id).set(rec); }
    toast(`✅ ERP 거래처로 등록했습니다: ${it.company}`);
  }catch(e){ console.error(e); toast('ERP 등록 실패 — 권한 또는 연결을 확인하세요'); }
}

function camShot(){
  const v=$('camvid');
  if (!v.videoWidth) return;
  /* 가이드 틀 영역만 잘라내기 (object-fit:cover 좌표 보정) */
  const vw=v.videoWidth, vh=v.videoHeight;
  const e=v.getBoundingClientRect(), f=$('camframe').getBoundingClientRect();
  const scale=Math.max(e.width/vw, e.height/vh);
  const visW=e.width/scale, visH=e.height/scale;
  const offX=(vw-visW)/2, offY=(vh-visH)/2;
  const fx=offX+(f.left-e.left)/scale, fy=offY+(f.top-e.top)/scale;
  const fw=f.width/scale, fh=f.height/scale;
  const c=document.createElement('canvas');
  c.width=Math.max(1,Math.round(fw)); c.height=Math.max(1,Math.round(fh));
  c.getContext('2d').drawImage(v, fx,fy,fw,fh, 0,0,c.width,c.height);
  const img=new Image();
  img.onload=()=>afterShot(shrink(img));
  img.src=c.toDataURL('image/jpeg',.92);
}
function afterShot(dataUrl){
  if (camStage==='front'){ camFront=dataUrl; $('camask').style.display='flex'; }
  else { const back=dataUrl; closeCamera(); startEditorFromCamera(camFront, back); }
}
function camAskBack(yes){

/* ════════════ 가져오기: 리멤버 엑셀 · 구글 CSV · vCard ════════════ */
async function needXLSX(){
  if (window.XLSX) return;

async function onImportFile(files){

  try{
    toast('파일 분석 중…',9000);

    if (/\.vcf$/i.test(f.name)) rows = parseVcf(await f.text());
    else { await needXLSX();
      const wb=XLSX.read(await f.arrayBuffer(),{type:'array'});
      rows = mapRows(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''})); }
    rows = rows.filter(r=>r.name||r.company||r.mobile||r.tel);
    if (!rows.length) return toast('가져올 연락처를 찾지 못했습니다');

/* 열 이름 자동 인식(리멤버·구글·일반 엑셀 공통) */
function classify(h){
  h=String(h).toLowerCase().replace(/[\s\-_]/g,'');
  if(/label$/.test(h)) return null;                 // 구글 CSV의 'Label' 칸(값 아님)은 무시
  if(/^(이름|성명|name|fn)$/.test(h)) return 'name';
  if(/(familyname|lastname|성$)/.test(h)) return 'family';
  if(/(givenname|firstname)/.test(h)) return 'given';
  if(/(회사|company|organizationname|소속|조직)/.test(h)) return 'company';
  if(/(부서|department)/.test(h)) return 'dept';
  if(/(직책|직급|직함|jobtitle|organizationtitle|^title$)/.test(h)) return 'title';
  if(/(휴대|핸드폰|mobile|cell)/.test(h)) return 'mobile';
  if(/(팩스|fax)/.test(h)) return 'fax';
  if(/(전화|phone|tel)/.test(h)) return 'phone';
  if(/(메일|email)/.test(h)) return 'email';
  if(/address.*formatted|주소.*formatted/.test(h)) return 'address';   // 주소는 Formatted만
  if(/^(주소|address)$/.test(h)) return 'address';
  if(/address/.test(h)) return null;                // 주소 세부분해칸(Street/City 등) 무시
  if(/(담당자|담당|owner)/.test(h)) return 'owner';
  if(/(메모|노트|note|비고)/.test(h)) return 'memo';
  return null;
}
/* 리멤버→구글 CSV 이름 엉킴 복원
   First="수민\u00a0총무(천일통신)", Last="김"  →  "김수민"
   (성은 Last칸, 이름은 First의 특수공백 앞, 회사·직책은 별도 칸) */
function rememberGiven(first){
  if(!first) return '';
  let s=String(first).replace(/\u00a0/g,'\x01').trim().replace(/^#/,'').trim();
  s=s.replace(/\([^)]*\)/g,'').replace(/[()]/g,'').trim();   // 괄호 안 회사 제거
  s = s.replace(/\x01/g,' ').trim();        // 특수공백 → 일반공백으로 통일
  // 한글이 있으면: 직책/소속 키워드 이전까지의 첫 한글 토큰을 이름으로
  if (/[가-힣]/.test(s)){
    let head = s.split(/\s+/)[0];           // 공백 기준 첫 토큰(보통 "이름" 또는 "이름직책")
    const km = head.match(/[가-힣]+/);
    let nm = km ? km[0] : head;
    nm = nm.replace(/(노무사|노무법인|변호사|대표이사|대표|부장|차장|과장|이사|팀장|원장|센터장|부사장|총무|공인노무사|교수|전무이사|사무국장|전문위원|프로|소장|실장|본부장|상무|전무|사장|회장|주임|대리|사원|법인|사무소).*$/,'').trim();
    if (nm) return nm;
    const any = s.match(/[가-힣]{2,4}/); if(any) return any[0];
  }
  const han=s.match(/[\u4e00-\u9fff]+/); if(han) return han[0];
  s=s.replace(/\b(CEO|President|Vice|Director|Manager|Management|General|Senior|Chief|Head|Officer|대표|부장|차장|과장|이사|팀장|원장|센터장|부사장|총무|대표이사|공인노무사|노무사|변호사|교수|전무이사|사무국장|전문위원|프로)\b.*$/i,'').trim();
  return s.trim();
}
function rememberFixName(first, last){
  const f=String(first||''), l=String(last||'');
  // 케이스1: Last가 한 글자 한글 성 + First에 이름  →  성+이름
  if (/^[가-힣]\s*$/.test(l.replace(/\u00a0/g,' '))){
    const g=rememberGiven(f); if(g) return (l.trim()+g).trim();
  }
  // 케이스2: 한쪽 칸에 "이름\u00a0직책(회사" 형태가 들어있음 → 특수공백 앞에서 이름 추출
  for (const part of [l, f]){              // Last 먼저(보통 여기 이름 있음)
    const p=part.replace(/\u00a0/g,'\x01');
    if (p.includes('\x01')){
      const cand=rememberGiven(p.split('\x01')[0]+'\x01');
      if (cand) return cand;
    }
  }
  // 케이스3: 합쳐서 한글 이름 추출
  const g2=rememberGiven(f) || rememberGiven(l);
  return g2 || (l+f).replace(/\u00a0/g,' ').replace(/[()#]/g,'').trim();
}
function mapRows(json){
  return json.map(r=>{
    const o={phones:[]};
    for (const [h,v0] of Object.entries(r)){
      const v=String(v0).trim(); if(!v) continue;
      const k=classify(h); if(!k) continue;
      const clean = s => String(s).split(':::')[0].trim()
        .replace(/^\*\s*(work|home|mobile|other|cell)?\s*/i,'').trim();   // 라벨 잔재 제거
      if (k==='phone'||k==='mobile')
        v.split(':::').forEach(p=>{ p=p.trim(); if(p)
          o.phones.push({v:p, m: k==='mobile' || /^01[016789]/.test(digits(p))}); });
      else if (k==='email'||k==='address'){ const cv=clean(v); if(cv && !o[k]) o[k]=cv; }
      else if (k==='given') o.given=v;
      else if (k==='family') o.family=v;
      else if (o[k]) o[k] += (k==='memo' ? '\n' : ' ') + v;
      else o[k]=v;
    }
    /* 이름 조립: First/Last 칸을 보고 리멤버 엉킴이면 복원 */
    const rawFirst = o.given || '';
    const rawLast  = o.family || '';
    if (/[()\u00a0]|^#/.test(rawFirst+rawLast)) o.name = rememberFixName(rawFirst, rawLast);
    else if(!o.name) o.name = (rawLast+rawFirst).trim();
    else if(/[()\u00a0]|^#/.test(o.name)) o.name = rememberFixName(o.name, '');
    const mob=o.phones.find(p=>p.m), tel=o.phones.find(p=>!p.m);
    return { name:o.name||'', company:o.company||'', dept:o.dept||'', title:o.title||'',
      mobile:mob?mob.v:'', tel:tel?tel.v:'', fax:o.fax||'', email:o.email||'',
      address:o.address||'', memo:o.memo||'' };
  });
}
/* vCard 파서 (갤럭시·구글 내보내기, QP 인코딩 지원) */
function qpDecode(s){
  const bytes=[];
  for(let i=0;i<s.length;i++){
    if (s[i]==='=' && /^[0-9A-Fa-f]{2}$/.test(s.slice(i+1,i+3))){ bytes.push(parseInt(s.slice(i+1,i+3),16)); i+=2; }
    else for(const b of new TextEncoder().encode(s[i])) bytes.push(b);
  }
  try{ return new TextDecoder('utf-8').decode(new Uint8Array(bytes)); }catch(e){ return s; }
}
function parseVcf(text){
  text=text.replace(/\r/g,'').replace(/=\n/g,'').replace(/\n[ \t]/g,'');
  const out=[];
  text.split(/END:VCARD/i).forEach(block=>{
    if(!/BEGIN:VCARD/i.test(block)) return;
    const o={phones:[]};
    block.split('\n').forEach(line=>{
      const i=line.indexOf(':'); if(i<0) return;
      const prop=line.slice(0,i), P=prop.toUpperCase();
      let val=line.slice(i+1);
      if(/ENCODING=QUOTED-PRINTABLE/.test(P)) val=qpDecode(val);
      val=val.replace(/\\n/gi,'\n').replace(/\\,/g,',').trim();
      if(!val) return;
      if(P==='FN'||P.startsWith('FN;')) o.name=val;
      else if(P==='N'||P.startsWith('N;')){ if(!o.name){ const p=val.split(';'); o.name=((p[0]||'')+(p[1]||'')).trim(); } }
      else if(P.startsWith('ORG')){ const p=val.split(';'); o.company=p[0]||''; o.dept=p[1]||''; }
      else if(P.startsWith('TITLE')) o.title=o.title||val;
      else if(P.startsWith('TEL')) o.phones.push({v:val, m:/CELL|MOBILE/.test(P)||/^01[016789]/.test(digits(val))});
      else if(P.startsWith('EMAIL')) o.email=o.email||val;
      else if(P.startsWith('ADR')) o.address=o.address||val.split(';').filter(Boolean).join(' ');
      else if(P.startsWith('NOTE')) o.memo=val;
    });
    const mob=o.phones.find(p=>p.m), tel=o.phones.find(p=>!p.m);
    out.push({ name:o.name||'', company:o.company||'', dept:o.dept||'', title:o.title||'',
      mobile:mob?mob.v:'', tel:tel?tel.v:'', fax:'', email:o.email||'', address:o.address||'', memo:o.memo||'' });
  });
  return out;
}

/* 중복 매칭 키: 휴대폰 → 이메일 → 이름+회사 */
function rowKeys(r){
  const ks=[]; const d=digits(r.mobile);
  if(d.length>=9) ks.push('p'+d);
  if(r.email) ks.push('e'+String(r.email).toLowerCase().trim());
  if(r.name && r.company) ks.push('n'+(r.name+'|'+r.company).toLowerCase().replace(/\s/g,''));
  return ks;
}
function buildKeyMap(){
  const map={};
  Object.values(state.items).filter(it=>it.kind==='card')
    .forEach(it=>rowKeys(it).forEach(k=>{ if(!map[k]) map[k]=it.id; }));
  return map;
}
const matchExisting=(r,map)=>{ for(const k of rowKeys(r)) if(map[k]) return map[k]; return null; };

let pendingImport=null;
function previewImport(rows,fname){
  const map=buildKeyMap(); let add=0,merge=0;
  const seen={};
  rows.forEach(r=>{ const id=matchExisting(r,{...map,...seen});
    if(id) merge++; else { add++; rowKeys(r).forEach(k=>seen[k]=k); } });
  $('impM').innerHTML=`
    <div class="mhead"><b>📥 가져오기 미리보기</b><button class="iconbtn" onclick="impBg.classList.remove('open')">✕</button></div>
    <p style="font-size:14.5px;line-height:2;color:var(--sub)">
      파일: <b style="color:var(--ink)">${esc(fname)}</b><br>
      발견된 연락처 <b style="color:var(--ink)">${rows.length.toLocaleString()}</b>건<br>
      · 신규 등록 <b style="color:var(--green)">${add.toLocaleString()}</b>건<br>
      · 기존 항목과 합침(빈 칸만 채움) <b style="color:var(--orange)">${merge.toLocaleString()}</b>건<br>
      모두 <b style="color:var(--ink)">명함</b> 탭으로 들어갑니다.</p>
    <div class="mfoot">
      <button class="btn ghost" onclick="impBg.classList.remove('open')">취소</button>
      <button class="btn primary" onclick="runImport()">가져오기 시작</button></div>`;
  pendingImport=rows;
  $('impBg').classList.add('open');
}
async function runImport(){
  $('impBg').classList.remove('open');
  const rows=pendingImport||[]; pendingImport=null;
  if (Store.mode==='local' && rows.length>300 &&
      !confirm('데모 모드에서는 대량 가져오기가 기기 용량을 초과할 수 있습니다.\nFirebase 연결 후 진행을 권장합니다. 계속할까요?')) return;
  /* 회사 없는 연락처를 모을 "지인" 그룹 확보(없으면 생성) */
  let friendG = Object.values(state.groups).find(g=>g.name==='지인');
  if (!friendG){ friendG={id:uid(), name:'지인', order:Date.now()}; Store.putGroup(friendG); }
  const map=buildKeyMap();
  const updates={}; let add=0,merge=0,i=0;
  for (const r of rows){
    i++;
    const exId=matchExisting(r,map);
    if (exId){
      const ex = updates[exId] || {...state.items[exId]};
      Object.keys(r).forEach(k=>{ if(r[k] && !ex[k]) ex[k]=r[k]; });
      ex.updatedAt=Date.now(); updates[exId]=ex; merge++;
    } else {
      const it={ id:uid(), kind:'card', thumb:'', group:'', createdAt:Date.now(), updatedAt:Date.now(), ...r };
      delete it.phones;
      if (!String(it.company||'').trim()) it.group = friendG.id;  /* 회사 없음 → 지인 폴더 */
      updates[it.id]=it; add++;
      rowKeys(r).forEach(k=>{ if(!map[k]) map[k]=it.id; });
    }
    if (i%300===0) toast(`가져오는 중… ${i.toLocaleString()}/${rows.length.toLocaleString()}`,4000);
  }
  if (Store.mode==='firebase'){
    const ids=Object.keys(updates);
    let ok=0, fail=0;
    for (let s=0;s<ids.length;s+=100){
      const chunk={}; ids.slice(s,s+100).forEach(id=>chunk[id]=updates[id]);
      try {
        await Store.db.ref(DB_ROOT+'/items').update(chunk);
        ok += Object.keys(chunk).length;
      } catch(e){ console.error('저장 실패 묶음', e); fail += Object.keys(chunk).length; }
      toast(`저장 중… ${Math.min(s+100,ids.length).toLocaleString()}/${ids.length.toLocaleString()}`,4000);
      await new Promise(r=>setTimeout(r,120));   // 과부하 방지로 살짝 쉼
    }
    toast(`✅ 가져오기 완료 — 저장 ${ok.toLocaleString()}건${fail?`, 실패 ${fail}건(다시 시도하세요)`:''}`,7000);
    return;
  } else { Object.assign(state.items, updates); Store._ls(); render(); }
  toast(`✅ 가져오기 완료 — 신규 ${add.toLocaleString()}건, 합침 ${merge.toLocaleString()}건`,6000);
}

/* ════════════ 🧹 중복 정리 ════════════ */
const FIELD_LABEL=Object.fromEntries([...CARD_FIELDS,...BIZ_FIELDS].map(([k,l])=>[k,l]));
function itemKeys(it){
  if (it.kind==='biz'){ const d=digits(it.bizno); return d.length>=10 ? ['b'+d] : []; }
  return rowKeys(it);
}
function findDupGroups(){
  const arr=Object.values(state.items).filter(it=>it.kind===state.tab);
  const parent={}; arr.forEach(it=>parent[it.id]=it.id);
  const find=x=>parent[x]===x?x:(parent[x]=find(parent[x]));
  const uni=(a,b)=>{ parent[find(a)]=find(b); };
  const map={};
  arr.forEach(it=>itemKeys(it).forEach(k=>{ if(map[k]) uni(it.id,map[k]); else map[k]=it.id; }));
  const groups={};
  arr.forEach(it=>{ const r=find(it.id); (groups[r]=groups[r]||[]).push(it); });
  return Object.values(groups).filter(g=>g.length>1);
}
async function mergeGroup(ids){
  const items=ids.map(id=>state.items[id]).filter(Boolean);
  if (items.length<2) return;
  items.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  const base={...items[0]};
  const fields=(base.kind==='card'?CARD_FIELDS:BIZ_FIELDS).map(f=>f[0]);
  const norm=v=>String(v).toLowerCase().replace(/[\s\-]/g,'');
  const conflicts=[];
  items.slice(1).forEach(o=>{
    fields.forEach(k=>{
      if(!o[k]) return;
      if(!base[k]) base[k]=o[k];
      else if(k!=='memo' && norm(base[k])!==norm(o[k])) conflicts.push(`[병합] 다른 ${FIELD_LABEL[k]}: ${o[k]}`);
    });
    if(!base.thumb && o.thumb) base.thumb=o.thumb;
    if(o.memo && o.memo!==base.memo) base.memo=((base.memo||'')+'\n'+o.memo).trim();
    base.createdAt=Math.min(base.createdAt||Date.now(), o.createdAt||Date.now());
  });
  if (conflicts.length) base.memo=((base.memo||'')+'\n'+[...new Set(conflicts)].join('\n')).trim();
  if (!(await Store.getPhoto(base.id)))
    for (const o of items.slice(1)){ const p=await Store.getPhoto(o.id); if(p){ Store.putPhoto(base.id,p); break; } }
  Store.put(base);
  items.slice(1).forEach(o=>Store.del(o.id));
}
function openDedup(){
  const groups=findDupGroups();
  if (!groups.length) return toast('중복이 없습니다 — 깨끗합니다 👍');
  let h=`<div class="mhead"><b>🧹 중복 정리 — ${groups.length}묶음</b>
    <button class="iconbtn" onclick="dedupBg.classList.remove('open')">✕</button></div>
    <p style="font-size:12.5px;color:var(--sub);line-height:1.7;margin-bottom:10px">
    병합 시 빈 칸은 서로 채워지고, 값이 서로 다른 항목은 메모에 [병합] 표시로 보존됩니다. 사진도 유지됩니다.</p>
    <button class="btn primary" style="width:100%;margin-bottom:12px" onclick="autoMergeAll()">⚡ ${groups.length}묶음 모두 자동 병합</button>`;
  groups.slice(0,100).forEach(g=>{
    const t = state.tab==='card' ? (g[0].name||g[0].company||'(이름 없음)') : (g[0].company||'(상호 없음)');
    const sub = g.map(x=> state.tab==='card' ? (x.company||x.mobile||'') : fmtBizno(x.bizno)).filter(Boolean).slice(0,3).join(' · ');
    h+=`<div class="ditem" style="align-items:center"><div class="v"><b>${esc(t)}</b>
      <span style="color:var(--orange);font-size:12.5px"> ${g.length}건</span><br>
      <span style="font-size:12px;color:var(--sub)">${esc(sub)}</span></div>
      <button class="btn ghost" style="flex:none;padding:9px 16px" onclick="mergeOne('${g.map(x=>x.id).join(',')}')">병합</button></div>`;
  });
  if (groups.length>100) h+=`<p style="color:var(--sub);font-size:12px;padding:8px 2px">…외 ${groups.length-100}묶음은 자동 병합을 사용하세요</p>`;
  $('dedupM').innerHTML=h; $('dedupBg').classList.add('open');
}
async function mergeOne(csv){ await mergeGroup(csv.split(',')); toast('병합 완료'); openDedup(); }
async function autoMergeAll(){
  const groups=findDupGroups(); let i=0;
  for (const g of groups){ await mergeGroup(g.map(x=>x.id));
    if (++i%10===0) toast(`병합 중… ${i}/${groups.length}`,3000); }
  $('dedupBg').classList.remove('open'); render();
  toast(`✅ ${i}묶음 병합 완료`,5000);
}

/* ════════════ 📤 엑셀 내보내기 ════════════ */
async function exportXlsx(){
  await needXLSX();
  const isCard = state.tab==='card';
  const fields = isCard ? CARD_FIELDS : BIZ_FIELDS;
  const rows = Object.values(state.items).filter(it=>it.kind===state.tab)
    .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0))
    .map(it=>{ const o={};
      fields.forEach(([k,l])=> o[l] = k==='bizno' ? fmtBizno(it[k]) : (it[k]||''));
      o['그룹'] = it.group && state.groups[it.group] ? state.groups[it.group].name : '';
      o['등록일'] = fmtDate(it.createdAt);
      return o; });
  if (!rows.length) return toast('내보낼 항목이 없습니다');
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, isCard?'명함':'사업자등록증');
  XLSX.writeFile(wb, `푸른명함첩_${isCard?'명함':'사업자등록증'}_${fmtDate(Date.now())}.xlsx`);
  toast('엑셀 파일을 내려받았습니다');
}

    }
  });
  if (!rows) rows = `<tr><td class="pcempty" colspan="8">등록된 항목이 없습니다 — 우측 상단 [＋ 명함 등록] 또는 이미지·PDF를 화면에 끌어다 놓으세요. (Ctrl+V 붙여넣기 가능)</td></tr>`;
  $('pcTable').innerHTML = `${colg}<thead>${thead}</thead><tbody>${rows}</tbody>`;
  /* 페이지 이동 바 */
  const pager=$('pcPager');
  if (totalPages>1){
    const btn=(label,pg,dis)=>`<button onclick="state.page=${pg};render()" ${dis?'disabled':''}
      style="border:1px solid #dde3ee;background:${dis?'#f1f4fa':'#fff'};border-radius:8px;padding:7px 13px;font-weight:700;color:#33415e;cursor:${dis?'default':'pointer'}">${label}</button>`;
    pager.innerHTML = btn('◀ 이전', state.page-1, state.page===0)
      + `<span>${(start+1).toLocaleString()}–${Math.min(start+size,items.length).toLocaleString()} / ${items.length.toLocaleString()}개 &nbsp;(${state.page+1}/${totalPages}쪽)</span>`
      + btn('다음 ▶', state.page+1, state.page>=totalPages-1);
  } else pager.innerHTML='';
}
function renderPC(){ renderPCSide(); renderPCTable(); }
/* 헤더 클릭 정렬: 같은 칸 누르면 방향 토글 */
function sortBy(key){
  if (state.sortKey===key) state.sortDir = state.sortDir==='asc' ? 'desc' : 'asc';
  else { state.sortKey=key; state.sortDir = key==='date' ? 'desc' : 'asc'; }
  state.page=0; render();
}

/* 화면 분기: PC면 관리자 UI, 폰이면 리멤버식 UI */
const renderMobile = render;
render = function(){
  if (document.body.classList.contains('pc')) renderPC();
  else renderMobile();
};
if (IS_PC){
  document.body.classList.add('pc');
  $('pcRoot').hidden = false;
}
render();
</script>
